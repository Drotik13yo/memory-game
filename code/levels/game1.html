<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Game1</title>
    <link rel="stylesheet" href="../css/game1.css">
</head>
<body>
    <div id="menu" class="menu">
        <div class="menu-title">Choose thema</div>
        <div id="level-buttons" class="level-buttons"></div>
    </div>
    <div id="game" style="display:none;">
        <div class="game-container">
        <div id="main-word"></div>

        <div class="button-container">
            <button id="btn1">
                <p id="word1">1</p>
            </button>
            <button id="btn2">
                <p id="word2">2</p>
            </button>
            <button id="btn3">
                <p id="word3">3</p>
            </button>
            <button id="btn4">
                <p id="word4">4</p>
            </button>
        </div>
        </div>
        
        <div id="overlay"></div>
        <div id="popup" class="popup"></div>

        <div class="progress-box">
            <span class="progress-text">
                <span id="current">0</span> / <span id="total">10</span>
            </span>
        </div>
        <div id="right-answer-box" class="right-answer-box">
            <span id="right-answer-count">0</span>
        </div>
        <div class="level-name-box" id="level-name"></div>
        <div class="level-number-box" id="level-number"></div>


    </div>
    <script src="../js/script.js"></script>
</body>
</html>
